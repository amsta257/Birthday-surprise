<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grace's Birthday Surprise!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #ff69b4;
        }
        .celebration {
            font-size: 24px;
            color: #4caf50;
        }
        .music-player {
            margin-top: 30px;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .youtube-container {
            position: relative;
            width: 100%;
            max-width: 560px;
            margin: 20px auto;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }
        .youtube-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Happy Birthday, Grace!</h1>
    <div class="celebration">
        🎉 To my dearest Grace, as you stand at the threshold of your 20s, I find myself looking at you with so much awe and wonder. Happy 20th Birthday to the girl who doesn't just enter a room[...] 
    </div>
    
    <!-- YouTube Music Player -->
    <div class="music-player">
        <p>🎵 Your Birthday Song 🎵</p>
        <div class="youtube-container">
            <iframe src="https://www.youtube.com/embed/l9O_SFcH4Kk?autoplay=1&loop=1" allow="autoplay"></iframe>
        </div>
    </div>
</body>
</html>
