<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    <style>
        body {
            background: linear-gradient(to bottom, darknavy, purple, red);
            color: white;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: yellow;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
        .celebration {
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <h1>Happy Birthday!</h1>
    <div class="celebration">
        <p>Let’s celebrate with music!</p>
    </div>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/YOUR_VIDEO_ID?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</body>
</html>
